<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 智能对话助手</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle" title="会话列表">☰</button>
    <div class="logo">
      <div class="logo-icon">🧠</div>
      <span class="header-title">智能对话助手</span>
    </div>
  </div>
  <div class="header-center">
    <span class="memory-badge" id="memoryBadge">💾 0 条记忆</span>
  </div>
  <div class="header-right">
    <select class="model-select" id="modelSelect">
      <optgroup label="DeepSeek">
        <option value="deepseek/deepseek-v4-flash" selected>DeepSeek V4 Flash</option>
        <option value="deepseek/deepseek-v4-pro">DeepSeek V4 Pro</option>
      </optgroup>
      <optgroup label="OpenAI">
        <option value="openai/gpt-4o-mini">GPT-4o-mini</option>
      </optgroup>
      <optgroup label="本地模型">
        <option value="ollama/qwen2.5">Qwen2.5 (Ollama)</option>
      </optgroup>
    </select>
    <button class="icon-btn" id="clearBtn" title="清空对话">🗑️</button>
  </div>
</header>

<div class="main-container">

  <!-- ─── 会话列表 ─── -->
  <aside class="sessions-panel" id="sessionsPanel">
    <div class="panel-header">
      <h2>💬 对话</h2>
      <button class="new-chat-btn" id="newChatBtn">＋ 新对话</button>
    </div>
    <div class="sessions-list" id="sessionsList"></div>
  </aside>

  <!-- ─── 记忆/知识库面板 ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="memories">🧠 记忆</button>
        <button class="tab-btn" data-tab="knowledge">📚 知识库</button>
      </div>
      <button class="icon-btn" id="closeSidebar">✕</button>
    </div>

    <div class="tab-content" id="tabMemories">
      <div class="sidebar-search">
        <input type="text" id="memorySearch" placeholder="搜索记忆..." />
      </div>
      <div class="sidebar-add-form">
        <input type="text" id="newMemoryInput" placeholder="添加新记忆..." />
        <select id="newMemoryType">
          <option value="general">一般</option>
          <option value="user_info">用户信息</option>
          <option value="preference">偏好</option>
          <option value="fact">事实</option>
          <option value="task">任务</option>
        </select>
        <button class="add-btn" id="addMemoryBtn">+</button>
      </div>
      <div class="sidebar-list" id="memoryList"></div>
      <div class="sidebar-footer"><span id="memoryCount">📝 0 条</span></div>
    </div>

    <div class="tab-content hidden" id="tabKnowledge">
      <div class="kb-upload-area">
        <input type="file" id="kbFileInput" accept=".txt,.md,.pdf,.py,.js,.json,.csv" hidden />
        <button class="kb-upload-btn" id="kbUploadBtn">📤 上传到知识库</button>
        <span class="kb-status" id="kbStatus"></span>
      </div>
      <div class="sidebar-list" id="kbList"></div>
      <div class="sidebar-footer" id="kbFooter"></div>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <!-- ─── 对话区域 ─── -->
  <main class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome-message">
        <div class="welcome-icon">🧠</div>
        <h2>你好！我是 智能对话助手</h2>
        <p>长期记忆 · 联网搜索 · 知识库 RAG · 文件上传</p>
        <div class="welcome-suggestions">
          <button class="suggestion-btn" data-msg="记住我喜欢喝冰美式，正在找实习">📝 记住我的信息</button>
          <button class="suggestion-btn" data-msg="今天北京天气怎么样？">🌤️ 查天气</button>
          <button class="suggestion-btn" data-msg="搜索一下2026年最新科技趋势">🔍 搜索科技趋势</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <button class="upload-btn" id="uploadBtn" title="上传文件">📎</button>
        <textarea id="chatInput" rows="1" placeholder="输入消息... (Enter 发送)"></textarea>
        <button id="sendBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
      <div class="input-status" id="inputStatus"><span id="uploadStatus"></span></div>
    </div>
    <input type="file" id="fileInput" hidden multiple />
  </main>
</div>

<!-- ─── 编辑记忆弹窗 ─── -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <h3>✏️ 编辑记忆</h3>
    <textarea id="editContent" rows="3"></textarea>
    <div class="modal-row">
      <select id="editType">
        <option value="general">一般</option>
        <option value="user_info">用户信息</option>
        <option value="preference">偏好</option>
        <option value="fact">事实</option>
        <option value="task">任务</option>
      </select>
      <input type="number" id="editImportance" min="1" max="10" placeholder="重要性" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelEdit">取消</button>
      <button class="btn-primary" id="saveEdit">保存</button>
    </div>
  </div>
</div>

<script src="script.js?v=1.2"></script>
</body>
</html>
